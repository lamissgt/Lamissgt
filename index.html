<!DOCTYPE html>
<html>
<head>
<title>Bingo</title>

<!-- LIBRERÍAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- FUENTE CALIGRAFÍA -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
font-family: Arial;
text-align:center;
}

.carton{
display:grid;
grid-template-columns: repeat(3,220px);
gap:15px;
margin:20px auto;
border:5px solid purple;
padding:20px;
padding-bottom:40px;
width:max-content;
background:white;
position:relative;
}

/* 🔥 TÍTULO MÁS GRANDE */
.titulo{
grid-column: span 3;
font-size:50px;
color:purple;
font-weight:bold;
margin-bottom:15px;
letter-spacing:3px;
text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.cuadro{
width:200px;
height:200px;
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.cuadro img{
width:100%;
height:100%;
object-fit:cover;
}

/* ✨ FIRMA */
.firma{
position:absolute;
bottom:5px;
left:10px;
font-family: 'Pacifico', cursive;
font-size:18px;
color:purple;
}

</style>

</head>

<body>

<h1>Generador de Bingo</h1>

<input type="file" id="imagenes" multiple>
<br><br>

<button onclick="crearMuchos()">Generate Bingos</button>
<button onclick="descargarPDF()">Download PDF</button>

<div id="area"></div>

<script>

function crearMuchos(){

let input = document.getElementById("imagenes")
let archivos = Array.from(input.files)

let area = document.getElementById("area")
area.innerHTML = ""

let cantidad = 10

for(let j=0; j<cantidad; j++){

let carton = document.createElement("div")
carton.className = "carton"

// título
let titulo = document.createElement("div")
titulo.className = "titulo"
titulo.innerText = "BINGO"
carton.appendChild(titulo)

// mezclar imágenes
let copia = [...archivos]
copia.sort(()=>Math.random()-0.5)

// crear 9 cuadros
for(let i=0;i<9;i++){

let cuadro = document.createElement("div")
cuadro.className = "cuadro"

let img = document.createElement("img")

if(copia[i]){
let reader = new FileReader()
reader.onload = function(e){
img.src = e.target.result
}
reader.readAsDataURL(copia[i])
}

cuadro.appendChild(img)
carton.appendChild(cuadro)

}

// ✨ FIRMA
let firma = document.createElement("div")
firma.className = "firma"
firma.innerText = "La Miss GT"
carton.appendChild(firma)

area.appendChild(carton)

}

}

async function descargarPDF(){

const { jsPDF } = window.jspdf
let doc = new jsPDF("p","mm","a4")

let cartones = document.querySelectorAll(".carton")

if(cartones.length === 0){
alert("Primero genera los bingos")
return
}

// esperar imágenes
let imagenes = document.querySelectorAll("img")

await Promise.all(Array.from(imagenes).map(img => {
return new Promise(resolve => {
if (img.complete) {
resolve()
} else {
img.onload = resolve
img.onerror = resolve
}
})
}))

// generar PDF
for(let i=0; i<cartones.length; i++){

let canvas = await html2canvas(cartones[i], {
scale: 2
})

let imgData = canvas.toDataURL("image/png")

doc.addImage(imgData, 'PNG', 10, 10, 190, 270)

if(i !== cartones.length - 1){
doc.addPage()
}

}

doc.save("bingo.pdf")

}

</script>

</body>
</html>
