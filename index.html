<!DOCTYPE html>
<html>
<head>
<title>Bingo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

/* 🌈 FONDO GENERAL */
body{
font-family: Arial, sans-serif;
text-align:center;
margin:0;
background: linear-gradient(135deg, #e0f7fa, #e1bee7);
min-height:100vh;
}

/* 📦 CONTENEDOR APP */
.contenedor{
max-width:1200px;
margin:20px auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* 🎓 TITULO */
h1{
font-size:40px;
color:#6a1b9a;
margin-bottom:15px;
text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
}

/* 🔘 BOTONES */
button{
background: linear-gradient(135deg, #7b1fa2, #ab47bc);
color:white;
border:none;
padding:12px 20px;
margin:5px;
font-size:16px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform: scale(1.05);
box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* 📂 INPUT */
input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
background:#fafafa;
}

/* CARTONES */
.carton{
display:grid;
grid-template-columns: repeat(3,220px);
gap:15px;
margin:20px auto;
border:5px solid purple;
padding:20px;
padding-bottom:40px;
width:max-content;
background:white;
position:relative;
border-radius:15px;
box-shadow: 0 8px 20px rgba(0,0,0,0.25);
transition:0.3s;
}

.carton:hover{
transform: scale(1.02);
}

.titulo{
grid-column: span 3;
font-size:50px;
color:purple;
font-weight:bold;
margin-bottom:15px;
letter-spacing:3px;
text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.cuadro{
width:200px;
height:200px;
border:2px solid #6a1b9a;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
border-radius:10px;
}

.cuadro img{
width:100%;
height:100%;
object-fit:cover;
}

.firma{
position:absolute;
bottom:5px;
left:10px;
font-family: 'Pacifico', cursive;
font-size:18px;
color:purple;
}

/* 🔥 TARJETAS MEJORADAS */
.tarjetas{
display:grid;
grid-template-columns: repeat(6, 1fr);
gap:10px;
justify-content:center;
margin-top:30px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

.tarjeta{
width:100%;
aspect-ratio:1/1;
border:2px solid #6a1b9a;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
border-radius:10px;
box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.tarjeta img{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>🎉 Bingo Educativo Interactivo 🎉</h1>

<input type="file" id="imagenes" multiple>
<br><br>

<button onclick="generarTodo()">Generar Todo</button>
<button onclick="descargarPDF()">Descargar PDF</button>

<div id="area"></div>

</div>

<script>

function generarTodo(){

let input = document.getElementById("imagenes")
let archivos = Array.from(input.files)

let area = document.getElementById("area")
area.innerHTML = ""

// 🔥 20 CARTONES
let cantidad = 20

for(let j=0; j<cantidad; j++){

let carton = document.createElement("div")
carton.className = "carton"

let titulo = document.createElement("div")
titulo.className = "titulo"
titulo.innerText = "BINGO"
carton.appendChild(titulo)

let copia = [...archivos]
copia.sort(()=>Math.random()-0.5)

for(let i=0;i<9;i++){

let cuadro = document.createElement("div")
cuadro.className = "cuadro"

let img = document.createElement("img")

if(copia[i]){
let reader = new FileReader()
reader.onload = e => img.src = e.target.result
reader.readAsDataURL(copia[i])
}

cuadro.appendChild(img)
carton.appendChild(cuadro)

}

let firma = document.createElement("div")
firma.className = "firma"
firma.innerText = "La Miss GT"
carton.appendChild(firma)

area.appendChild(carton)
}

// 🔥 TARJETAS DEL CANTADOR
let contenedorTarjetas = document.createElement("div")
contenedorTarjetas.className = "tarjetas"

archivos.forEach(file => {

let tarjeta = document.createElement("div")
tarjeta.className = "tarjeta"

let img = document.createElement("img")

let reader = new FileReader()
reader.onload = e => img.src = e.target.result
reader.readAsDataURL(file)

tarjeta.appendChild(img)
contenedorTarjetas.appendChild(tarjeta)

})

area.appendChild(contenedorTarjetas)

}

async function descargarPDF(){

const { jsPDF } = window.jspdf
let doc = new jsPDF("p","mm","a4")

let elementos = document.querySelectorAll("#area > *")

if(elementos.length === 0){
alert("Primero genera el bingo")
return
}

// esperar imágenes
let imagenes = document.querySelectorAll("img")

await Promise.all(Array.from(imagenes).map(img => {
return new Promise(resolve => {
if (img.complete) resolve()
else {
img.onload = resolve
img.onerror = resolve
}
})
}))

for(let i=0; i<elementos.length; i++){

let canvas = await html2canvas(elementos[i], { scale: 2 })

let imgData = canvas.toDataURL("image/png")

doc.addImage(imgData, 'PNG', 10, 10, 190, 270)

if(i !== elementos.length - 1){
doc.addPage()
}

}

doc.save("bingo.pdf")

}

</script>

</body>
</html>
