<!DOCTYPE html>
<html>
<head>
<title>Bingo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family: Arial;
text-align:center;
}

.carton{
display:grid;
grid-template-columns: repeat(3,200px);
gap:10px;
margin:20px auto;
border:4px solid purple;
padding:20px 20px 80px 20px;
width:max-content;
position:relative;
background:white;
}

.titulo{
grid-column: span 3;
height:100px;
display:flex;
align-items:center;
justify-content:center;
}

.titulo img{
max-width:100%;
max-height:100%;
}

.cuadro{
width:200px;
aspect-ratio:1/1;
border:2px solid black;
overflow:hidden;
}

.cuadro img{
width:100%;
height:100%;
object-fit:contain;
background:white;
}

.nombre{
position:absolute;
bottom:10px;
left:10px;
font-style:italic;
color:purple;
}

.logo{
position:absolute;
bottom:10px;
right:10px;
}

.logo img{
width:60px;
}

</style>

</head>

<body>

<h2>Generador de Bingo</h2>

<input type="file" id="imagenes" multiple>
<br><br>

<button onclick="crear()">Generar</button>
<button onclick="pdf()">Descargar PDF</button>

<div id="area"></div>

<script>

// convertir a base64
function base64(file){
return new Promise(r=>{
let reader=new FileReader()
reader.readAsDataURL(file)
reader.onload=()=>r(reader.result)
})
}

// crear cartones
async function crear(){

let input=document.getElementById("imagenes")
let files=Array.from(input.files)

let area=document.getElementById("area")
area.innerHTML=""

let imgs=[]

for(let f of files){
imgs.push(await base64(f))
}

for(let j=0;j<5;j++){

let c=document.createElement("div")
c.className="carton"

// título
let t=document.createElement("div")
t.className="titulo"
t.innerHTML='<img src="titulo.png" onerror="this.style.display=\'none\'">'
c.appendChild(t)

// mezclar
let copia=[...imgs].sort(()=>Math.random()-0.5)

// cuadros
for(let i=0;i<9;i++){
let d=document.createElement("div")
d.className="cuadro"

let im=document.createElement("img")
if(copia[i]) im.src=copia[i]

d.appendChild(im)
c.appendChild(d)
}

// nombre
let n=document.createElement("div")
n.className="nombre"
n.innerText="La Miss GT"
c.appendChild(n)

// logo
let l=document.createElement("div")
l.className="logo"
l.innerHTML='<img src="logo.png" onerror="this.style.display=\'none\'">'
c.appendChild(l)

area.appendChild(c)

}

}

// 🔥 PDF REAL FUNCIONANDO
async function pdf(){

const { jsPDF } = window.jspdf

let cartones = document.querySelectorAll(".carton")

if(cartones.length == 0){
alert("Primero genera")
return
}

let doc = new jsPDF("p","mm","a4")

for(let i = 0; i < cartones.length; i++){

await doc.html(cartones[i],{
x:10,
y:10,
width:190,
windowWidth:800
})

if(i < cartones.length - 1){
doc.addPage()
}

}

// 🔥 descarga directa REAL
doc.save("bingo.pdf")

}

</script>

</body>
</html>
